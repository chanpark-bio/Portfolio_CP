project:
  project_name: Portfolio_CoV2_CoV2
  target_pdb_id: 6M0J
  global_seed: 42
  hotspots:
  - E484
  - E493
  - E501
paths:
  base_dir: 03_Workspace/Portfolio_CoV2_CoV2
  control_dir: 00_Master_Control
  db_path: 03_Workspace/Portfolio_CoV2_CoV2/00_Master_Control/insilico_master.db
pipeline_control:
  step01_target_profiling: overwrite
  step02_rfdiffusion: overwrite
  step03_proteinmpnn: overwrite
  step04_fast_cascade: overwrite
  step05_foldx_physics: overwrite
  step06_champion_selector: overwrite
  step07_maturation: overwrite
  step08_validation: overwrite
  step09_wetlab_translation: overwrite
rfdiffusion:
  contig: E333-526/0 15-50
  num_designs: 100
filtering_strictness:
  rmsd_absolute_cutoff: 3.0
  rmsd_relative_top_percent: 10.0
  physicochemical_top_percent: 50.0
  max_instability: 40.0
  max_a3d_score: 1.0
  max_ddg_cutoff: -3.0
  ddg_top_percent: 20.0
  weights:
    ddg: 0.4
    a3d: 0.2
    immuno: 0.2
    instability: 0.2
  mutagenesis_library_size: 500
  mutagenesis_ddg_improve: -1.5
  absolute_elite_ddg: -3.0
  final_top_count: 3
system:
  max_threads: 16
  host_organism: e_coli_k12
validation_params:
  min_plddt: 80.0
  min_iptm: 0.6
  max_rmsd: 2.0
  md_topology_profile: standard_soluble_protein
  md_params:
    temperature: 300
    pressure: 1.0
    em_steps: 500
    nvt_steps: 500
    npt_steps: 500
    md_steps: 500000
    dt: 0.002

